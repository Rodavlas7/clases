{% extends "base/base.html" %}

{% block title %}CREATE SERVICIO{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Crear Nuevo Servicio</h2>
    <hr>
    
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Servicio</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="capacidad" class="form-label">Capacidad</label>
                <input type="number" class="form-control" id="capacidad" name="capacidad" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="costo" class="form-label">Costo</label>
                <input type="number" step="0.01" class="form-control" id="costo" name="costo" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="region" class="form-label">Región</label>
            <input type="text" class="form-control" id="region" name="region" required>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="estado" name="estado" checked>
            <label class="form-check-label" for="estado">¿Servicio Activo?</label>
        </div>
        
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{% url 'home:list_servicio' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}

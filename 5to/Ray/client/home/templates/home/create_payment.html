{% extends "base/base.html" %}

{% block title %}
    Create Payment view
{% endblock %}
{% block content %}
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}  
        <br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>


        <label for="accounts">Accounts:</label>
        <input type="text" name="accounts_id" id="accounts_id" required>
        <br><br>

        <label for="created_by">Created By:</label>
        <input type="number" name="created_by" id="created_by" required>
        <br><br>

        <button type="submit" class="btn btn-outline-success">Create Payment</button>
        <a href="{% url 'home:list_payments' %}" class="btn btn-outline-warning">Cancel</a> </form>
{% endblock %}

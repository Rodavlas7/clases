<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario HTML practica cero</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <h1>Formulario de Registro</h1>
    <p>Complete el siguiente formulario con sus datos personales.</p>

    <form>
        <label for="nombre">Nombre Completo:</label><br>
        <input type="text" id="nombre" name="nombre" required>
        <br><br>

        <label for="correo">Correo Electrónico:</label><br>
        <input type="email" id="correo" name="correo" required>
        <br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label>Género:</label><br>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label><br>

        <input type="radio" id="femenino" name="genero" value="femenino">
        <label for="femenino">Femenino</label><br><br>

        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto los términos y condiciones</label><br><br>

        <label for="comentarios">Comentarios:</label><br>
        <textarea id="comentarios" name="comentarios" rows="4" cols="40"></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>
    
</body>
</html>
